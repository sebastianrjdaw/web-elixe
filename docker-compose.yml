services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: elixe-web-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
      - app-vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - app-vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    depends_on:
      - app

  queue:
    image: elixe-web-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
    depends_on:
      - app
      - redis

  scheduler:
    image: elixe-web-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
    depends_on:
      - app
      - redis

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: elixe_ads
      MYSQL_USER: elixe
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  app-vendor:
  composer-cache:
  mysql-data:
  node-modules:
